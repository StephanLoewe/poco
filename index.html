<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Planner" />
    <meta name="theme-color" content="#2563EB" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Structured Planner</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100%; }
      body {
        background: #F4F6FB;
        height: var(--app-height, 100vh);
        overflow: hidden;
        overscroll-behavior: none;
      }
      #root {
        height: var(--app-height, 100vh);
        overflow: hidden;
      }
    </style>
    <script>
      // iOS Safari reports vh/dvh unreliably (toolbar height gap). Measure the
      // actual visible viewport directly and expose it as --app-height.
      (function () {
        function setAppHeight() {
          var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
          document.documentElement.style.setProperty("--app-height", h + "px");
        }
        setAppHeight();
        window.addEventListener("resize", setAppHeight);
        window.addEventListener("orientationchange", setAppHeight);
        if (window.visualViewport) window.visualViewport.addEventListener("resize", setAppHeight);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
